name: AI Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  gemini-review:
    name: Gemini PR Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin main
          DIFF=$(git diff origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' | head -c 12000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gemini code review
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          DIFF='${{ steps.diff.outputs.diff }}'

          PROMPT="You are a senior frontend engineer reviewing a pull request for a Web3 DeFi trading terminal built with Next.js 15, TypeScript strict, wagmi v2, and shadcn/ui.

          Review the following diff and provide concise, actionable feedback. Focus on:
          - TypeScript type safety issues (no any, no unsafe assertions)
          - wagmi v2 hook usage patterns
          - React best practices (no useEffect for data fetching, prefer TanStack Query)
          - Security concerns (especially wallet/transaction related code)
          - Missing error handling at system boundaries

          Be direct. Skip praise. Only flag real issues or genuine improvements.
          Format as a markdown list. If no issues found, say '✅ LGTM — no issues found.'

          Diff:
          \`\`\`
          ${DIFF}
          \`\`\`"

          RESPONSE=$(curl -s \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":$(echo "$PROMPT" | jq -Rs '.')}]}]}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}")

          REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "리뷰를 가져올 수 없습니다."')

          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const review = `## 🤖 Gemini AI Code Review\n\n${{ steps.review.outputs.review }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: review
            });
