name: AI Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  gemini-review:
    name: Gemini PR Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          DIFF=$(git diff "$BASE_SHA"..."$HEAD_SHA" -- '*.ts' '*.tsx' '*.js' '*.jsx' | head -c 12000)

          if [ -z "$DIFF" ]; then
            REVIEW="변경된 TS/TSX 파일이 없습니다."
          else
            PAYLOAD=$(jq -n \
              --arg diff "$DIFF" \
              '{
                contents: [{
                  parts: [{
                    text: ("You are a senior frontend engineer reviewing a PR for a Web3 DeFi terminal (Next.js 15, TypeScript strict, wagmi v2, shadcn/ui).\n\nReview the diff below. Focus only on real issues:\n- TypeScript type safety (no any, no unsafe assertions)\n- wagmi v2 hook patterns\n- React best practices (no raw useEffect for data fetching)\n- Security issues in wallet/transaction code\n- Missing error handling at system boundaries\n\nBe direct. Skip praise. Format as a markdown list. If no issues, write: ✅ LGTM\n\nDiff:\n```\n" + $diff + "\n```")
                  }]
                }]
              }')

            RESPONSE=$(curl -sf \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" || echo "{}")

            REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Gemini API 호출 실패"')
          fi

          BODY="## 🤖 Gemini AI Code Review

          ${REVIEW}"

          gh pr comment "$PR_NUMBER" --body "$BODY"
